<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌷</title>

<style>

body{
margin:0;
overflow:hidden;
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(to top,#ffd6e7,#c9f4ff);
height:100vh;
}

/* garden container */

.garden{
position:relative;
width:100%;
height:100%;
overflow:hidden;
}

/* tulips */

.tulip{
position:absolute;
bottom:0;
width:18px;
height:120px;
background:#3fa34d;
transform-origin:bottom;
animation:sway 4s ease-in-out infinite alternate;
}

.tulip::before{
content:'';
position:absolute;
top:-35px;
left:-15px;
width:50px;
height:40px;
background:#ff4d6d;
border-radius:30px 30px 20px 20px;
animation:colorChange 8s infinite alternate;
}

@keyframes sway{
0%{transform:rotate(-4deg)}
100%{transform:rotate(4deg)}
}

@keyframes colorChange{
0%{background:#ff4d6d}
25%{background:#ff758f}
50%{background:#ff9ec4}
75%{background:#ff6b6b}
100%{background:#ff4d6d}
}

/* fireflies */

.firefly{
position:absolute;
width:6px;
height:6px;
background:#fff176;
border-radius:50%;
box-shadow:0 0 10px #fff176,0 0 20px #fff176;
animation:float 10s linear infinite;
opacity:.8;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-120px)}
100%{transform:translateY(0)}
}

/* petals */

.petal{
position:absolute;
width:10px;
height:10px;
background:#ff8fab;
border-radius:50% 50% 50% 0;
pointer-events:none;
animation:petalFall 4s linear forwards;
}

@keyframes petalFall{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(120px) rotate(360deg);
opacity:0;
}
}

/* message */

.message{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:1.8rem;
color:#d6336c;
opacity:0;
transition:opacity 3s ease;
padding:0 20px;
}

.show{
opacity:1;
}

</style>
</head>

<body>

<div class="garden" id="garden"></div>

<div class="message" id="message">
Happy Women’s Day, my woman.. my inspiration, and the strongest woman…<br>
who keeps me going and encourages me to move forward.
</div>

<script>

const garden=document.getElementById("garden")

/* tulips */

for(let i=0;i<25;i++){

let tulip=document.createElement("div")
tulip.className="tulip"

tulip.style.left=Math.random()*100+"%"
tulip.style.height=90+Math.random()*60+"px"
tulip.style.animationDuration=3+Math.random()*3+"s"

garden.appendChild(tulip)

}

/* fireflies */

for(let i=0;i<18;i++){

let fly=document.createElement("div")
fly.className="firefly"

fly.style.left=Math.random()*window.innerWidth+"px"
fly.style.top=Math.random()*window.innerHeight+"px"
fly.style.animationDuration=6+Math.random()*6+"s"

garden.appendChild(fly)

}

/* petals on hover */

document.addEventListener("mousemove",e=>{

for(let i=0;i<2;i++){

let petal=document.createElement("div")
petal.className="petal"

petal.style.left=e.clientX+Math.random()*20-10+"px"
petal.style.top=e.clientY+"px"

document.body.appendChild(petal)

setTimeout(()=>{petal.remove()},4000)

}

})

/* message reveal */

setTimeout(()=>{
document.getElementById("message").classList.add("show")
},2000)

</script>

</body>
</html>
